<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500">
  <!-- Twitter/X Header - 1500x500 recommended size -->
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="twGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0F1E"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#twGradient)"/>
  
  <!-- Ice Blue accent bar at bottom -->
  <rect x="0" y="485" width="1500" height="15" fill="#38BDF8"/>
  
  <!-- Logo mark on left -->
  <text x="150" y="320" 
        font-family="Arial Black, sans-serif" 
        font-size="220" 
        font-weight="900" 
        fill="#FFFFFF">N</text>
  
  <!-- Company name -->
  <text x="400" y="220" 
        font-family="Arial, sans-serif" 
        font-size="80" 
        font-weight="900" 
        fill="#FFFFFF" 
        letter-spacing="4">NORTH SLOPE</text>
  <text x="400" y="320" 
        font-family="Arial, sans-serif" 
        font-size="80" 
        font-weight="900" 
        fill="#38BDF8" 
        letter-spacing="4">TRADES</text>
  
  <!-- Tagline -->
  <text x="400" y="400" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="#94A3B8" 
        letter-spacing="2">RAPID LABOR DEPLOYMENT FOR ALASKA'S NORTH SLOPE</text>
  
  <!-- 72 Hours badge on right -->
  <rect x="1150" y="150" width="250" height="200" rx="8" fill="rgba(56,189,248,0.1)" stroke="#38BDF8" stroke-width="2"/>
  <text x="1275" y="250" 
        font-family="Arial Black, sans-serif" 
        font-size="80" 
        font-weight="900" 
        fill="#38BDF8" 
        text-anchor="middle">72</text>
  <text x="1275" y="300" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        font-weight="700" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        letter-spacing="3">HOUR DEPLOYMENT</text>
</svg>
